name: Skill Quality

on:
  pull_request:
    paths:
      - 'SKILL.md'
      - 'skills/autogrind/SKILL.md'
      - 'plugins/autogrind/skills/autogrind/SKILL.md'
      - 'commands/autogrind.md'
      - 'plugins/autogrind/commands/autogrind.md'
  push:
    branches: [main]
    paths:
      - 'SKILL.md'
      - 'commands/autogrind.md'

jobs:
  word-count:
    name: SKILL.md word budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SKILL.md word count
        run: |
          count=$(wc -w < SKILL.md)
          echo "SKILL.md word count: $count / 2000"
          if [ "$count" -gt 2000 ]; then
            echo "::error file=SKILL.md::Word count $count exceeds 2000-word budget. Trim SKILL.md before merging."
            exit 1
          fi

  skill-sync:
    name: SKILL.md and commands copies in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify SKILL.md copies are identical
        run: |
          root="SKILL.md"
          copy1="skills/autogrind/SKILL.md"
          copy2="plugins/autogrind/skills/autogrind/SKILL.md"
          ok=true
          if ! diff -q "$root" "$copy1" > /dev/null 2>&1; then
            echo "::error::$root and $copy1 are out of sync"
            ok=false
          fi
          if ! diff -q "$root" "$copy2" > /dev/null 2>&1; then
            echo "::error::$root and $copy2 are out of sync"
            ok=false
          fi
          $ok || exit 1

      - name: Verify commands/autogrind.md copies are identical
        run: |
          root="commands/autogrind.md"
          copy="plugins/autogrind/commands/autogrind.md"
          if ! diff -q "$root" "$copy" > /dev/null 2>&1; then
            echo "::error::$root and $copy are out of sync"
            exit 1
          fi
